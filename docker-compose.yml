services:
  postgres:
    image: postgres:16
    container_name: agenda-worker-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - ${DATABASE_PORT}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

  waha:
    image: devlikeapro/waha:gows-2026.4.3
    container_name: agenda-worker-waha
    restart: always
    ports:
      - ${WAHA_PORT:-3001}:3000
    environment:
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WAHA_WEBHOOK_URL=${WAHA_WEBHOOK_URL}
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USERNAME}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD}
      - WHATSAPP_SWAGGER_USERNAME=${WHATSAPP_SWAGGER_USERNAME}
      - WHATSAPP_SWAGGER_PASSWORD=${WHATSAPP_SWAGGER_PASSWORD}
    volumes:
      - waha_sessions:/app/src/sessions

volumes:
  postgres_data:
  waha_sessions:
