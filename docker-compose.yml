services: 
  postgres:
    image: postgres:16
    container_name: agenda-worker-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - ${DATABASE_PORT}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

  waha:
    image: devlikeapro/waha:latest
    container_name: agenda-worker-waha
    restart: always
    ports:
      - ${WAHA_PORT:-3001}:3000
    environment:
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WAHA_WEBHOOK_URL=${WAHA_WEBHOOK_URL}
    volumes:
      - waha_sessions:/app/src/sessions

volumes:
  postgres_data:
  waha_sessions:
